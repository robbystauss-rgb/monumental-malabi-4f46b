name: test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Static site sanity check
        run: |
          test -f index.html
          test -f order.html
          test -f assets/styles.css
          test -f assets/app.js
          test -f assets/catalog-data.js
          test -f .github/workflows/deploy-pages.yml
          echo "Static site repo looks good."
